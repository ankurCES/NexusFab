services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexusfab
      POSTGRES_PASSWORD: nexusfab
      POSTGRES_DB: nexusfab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusfab"]
      interval: 2s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
